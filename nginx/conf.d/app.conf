server {
    listen 80;
    server_name wk-archi-o22a-15m-g1.fr www.wk-archi-o22a-15m-g1.fr;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name wk-archi-o22a-15m-g1.fr www.wk-archi-o22a-15m-g1.fr;

    ssl_certificate     /etc/letsencrypt/live/wk-archi-o22a-15m-g1.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wk-archi-o22a-15m-g1.fr/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location / {
        proxy_pass http://app:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_redirect off;
    }
}