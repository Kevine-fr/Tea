name: Deploy to VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          ssh $VPS_USERNAME@$VPS_HOST bash -s << 'ENDSSH'
            set -e
            
            echo "📦 Préparation du déploiement..."
            cd ~/tea-app || exit 1
            
            # Variables passées en argument
            GH_TOKEN="${1}"
            REPO="${2}"
            BRANCH="${3}"
            MYSQL_PASS="${4}"
            GRAFANA_PASS="${5}"
            
            # Clone ou pull le repo avec le token
            if [ ! -d ".git" ]; then
              echo "📥 Clonage du repository..."
              git clone https://${GH_TOKEN}@github.com/${REPO}.git .
            else
              echo "🔄 Mise à jour du code..."
              git remote set-url origin https://${GH_TOKEN}@github.com/${REPO}.git
              git fetch origin
              git reset --hard origin/${BRANCH}
            fi
            
            # Créer le fichier .env
            echo "⚙️ Configuration de l'environnement..."
            cat > .env << EOF
          MYSQL_ROOT_PASSWORD=${MYSQL_PASS}
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_PASS}
          APP_KEY=
          EOF
            
            # Générer APP_KEY si nécessaire
            if [ -z "$(grep 'APP_KEY=' .env | cut -d '=' -f2)" ]; then
              APP_KEY=$(docker run --rm php:8.2-cli php -r "echo 'base64:' . base64_encode(random_bytes(32));")
              sed -i "s|APP_KEY=|APP_KEY=${APP_KEY}|g" .env
            fi
            
            # Créer les dossiers de monitoring
            mkdir -p monitoring/prometheus
            mkdir -p monitoring/grafana/provisioning/datasources
            
            # Créer prometheus.yml
            if [ ! -f monitoring/prometheus/prometheus.yml ]; then
              cat > monitoring/prometheus/prometheus.yml << 'PROMEOF'
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
          
          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']
          
            - job_name: 'laravel-app'
              static_configs:
                - targets: ['app:8000']
              metrics_path: '/metrics'
              scrape_interval: 5s
          
            - job_name: 'node-exporter'
              static_configs:
                - targets: ['node-exporter:9100']
          
            - job_name: 'cadvisor'
              static_configs:
                - targets: ['cadvisor:8080']
          PROMEOF
            fi
            
            # Arrêter les anciens conteneurs
            echo "🛑 Arrêt des anciens conteneurs..."
            docker compose -f docker-compose.prod.yml down || true
            
            # Rebuilder et démarrer
            echo "🚀 Démarrage des nouveaux conteneurs..."
            docker compose -f docker-compose.prod.yml up -d --build
            
            # Attendre le démarrage
            echo "⏳ Attente du démarrage..."
            sleep 15
            
            # Migrations
            echo "🔧 Migrations..."
            docker exec tea_serveur php artisan migrate --force || echo "⚠️ Migrations échouées"
            
            # Optimisations
            echo "⚡ Optimisation..."
            docker exec tea_serveur php artisan config:cache || true
            docker exec tea_serveur php artisan route:cache || true
            docker exec tea_serveur php artisan view:cache || true
            
            # État
            echo "📊 État des conteneurs :"
            docker ps
            
            echo "✅ Déploiement terminé !"
            echo "🌐 Application : http://${VPS_HOST}"
            echo "📊 Grafana : http://${VPS_HOST}:3000"
            echo "📈 Prometheus : http://${VPS_HOST}:9090"
          ENDSSH "$GH_TOKEN" "$REPO" "$BRANCH" "$MYSQL_ROOT_PASSWORD" "$GRAFANA_ADMIN_PASSWORD"