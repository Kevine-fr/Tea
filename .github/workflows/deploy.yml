name: Deploy to VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          ssh $VPS_USERNAME@$VPS_HOST << 'ENDSSH'
            set -e
            
            echo "📦 Préparation du déploiement..."
            cd ~/tea-app || exit 1
            
            # Clone ou pull le repo
            if [ ! -d ".git" ]; then
              echo "📥 Clonage du repository..."
              git clone https://github.com/${{ github.repository }} .
            else
              echo "🔄 Mise à jour du code..."
              git fetch origin
              git reset --hard origin/${{ github.ref_name }}
            fi
            
            # Créer le fichier .env
            echo "⚙️ Configuration de l'environnement..."
            cat > .env << 'EOF'
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          APP_KEY=
          EOF
            
            # Générer APP_KEY si nécessaire
            if [ -z "$(grep 'APP_KEY=' .env | cut -d '=' -f2)" ]; then
              APP_KEY=$(docker run --rm php:8.2-cli php -r "echo 'base64:' . base64_encode(random_bytes(32));")
              sed -i "s|APP_KEY=|APP_KEY=$APP_KEY|g" .env
            fi
            
            # Créer les dossiers de monitoring s'ils n'existent pas
            mkdir -p monitoring/prometheus
            mkdir -p monitoring/grafana/provisioning/datasources
            
            # Créer le fichier prometheus.yml s'il n'existe pas
            if [ ! -f monitoring/prometheus/prometheus.yml ]; then
              cat > monitoring/prometheus/prometheus.yml << 'PROMEOF'
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
          
          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']
          
            - job_name: 'laravel-app'
              static_configs:
                - targets: ['app:8000']
              metrics_path: '/metrics'
              scrape_interval: 5s
          
            - job_name: 'node-exporter'
              static_configs:
                - targets: ['node-exporter:9100']
          
            - job_name: 'cadvisor'
              static_configs:
                - targets: ['cadvisor:8080']
          PROMEOF
            fi
            
            # Arrêter les anciens conteneurs
            echo "🛑 Arrêt des anciens conteneurs..."
            docker compose -f docker-compose.prod.yml down || true
            
            # Rebuilder et démarrer
            echo "🚀 Démarrage des nouveaux conteneurs..."
            docker compose -f docker-compose.prod.yml up -d --build
            
            # Attendre que les conteneurs démarrent
            echo "⏳ Attente du démarrage des services..."
            sleep 15
            
            # Migrations et optimisations
            echo "🔧 Exécution des migrations..."
            docker exec tea_serveur php artisan migrate --force || echo "⚠️ Migrations échouées"
            
            echo "⚡ Optimisation de Laravel..."
            docker exec tea_serveur php artisan config:cache || true
            docker exec tea_serveur php artisan route:cache || true
            docker exec tea_serveur php artisan view:cache || true
            
            # Afficher l'état
            echo "📊 État des conteneurs :"
            docker ps
            
            echo "✅ Déploiement terminé avec succès !"
            echo "🌐 Application accessible sur : http://${{ secrets.VPS_HOST }}"
            echo "📊 Grafana : http://${{ secrets.VPS_HOST }}:3000"
            echo "📈 Prometheus : http://${{ secrets.VPS_HOST }}:9090"
          ENDSSH