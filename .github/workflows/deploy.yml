name: Deploy to VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "bash -s" <<EOF
          set -e

          echo "📦 Préparation du déploiement..."
          mkdir -p ~/tea-app
          cd ~/tea-app

          # Clone ou update repo
          if [ ! -d ".git" ]; then
            echo "📥 Clonage..."
            git clone https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git .
          else
            echo "🔄 Mise à jour..."
            git remote set-url origin https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
          fi

          echo "⚙️ Création du .env..."
          cat > .env <<ENVEOF
          APP_ENV=production
          APP_DEBUG=false
          APP_DOMAIN=${{ secrets.APP_DOMAIN }}

          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}

          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_SMTP_USER=${{ secrets.GRAFANA_SMTP_USER }}
          GRAFANA_SMTP_PASSWORD=${{ secrets.GRAFANA_SMTP_PASSWORD }}

          APP_KEY=
          ENVEOF

          # Générer APP_KEY si absent
          if ! grep -q 'APP_KEY=base64:' .env; then
            echo "🔑 Génération APP_KEY..."
            APP_KEY=\$(docker run --rm php:8.2-cli php -r "echo 'base64:' . base64_encode(random_bytes(32));")
            sed -i "s|APP_KEY=|APP_KEY=\${APP_KEY}|g" .env
          fi

          echo "🛑 Arrêt anciens conteneurs..."
          docker compose -f docker-compose.prod.yml down --remove-orphans || true

          echo "🏗 Build propre..."
          docker compose -f docker-compose.prod.yml build --no-cache

          echo "🚀 Démarrage..."
          docker compose -f docker-compose.prod.yml up -d

          echo "⏳ Attente du conteneur Laravel..."
          sleep 15

          # Vérifie que le conteneur existe
          if docker ps --format '{{.Names}}' | grep -q "tea_serveur"; then
            echo "🔧 Migrations..."
            docker exec tea_serveur php artisan migrate --force

            echo "⚡ Optimisation..."
            docker exec tea_serveur php artisan config:cache || true
            docker exec tea_serveur php artisan route:cache || true
            docker exec tea_serveur php artisan view:cache || true
          else
            echo "❌ Conteneur tea_serveur non trouvé"
            docker ps
            exit 1
          fi

          echo ""
          echo "📊 État des conteneurs :"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

          echo ""
          echo "✅ Déploiement terminé"
          echo "🌐 Application : http://${{ secrets.APP_DOMAIN }}"
          echo "📊 Grafana : http://${{ secrets.APP_DOMAIN }}/grafana"
          echo "📈 Prometheus : http://${{ secrets.APP_DOMAIN }}/prometheus"

          EOF